<!DOCTYPE HTML>
<html lang="en" style="background:#1b1f22">
<head>
	<title>Assembly Viewer | Adam Grim</title>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
	<link rel="stylesheet" href="assets/css/main.css" />
	<link rel="stylesheet" href="assets/css/viewer.css" />
	<!--
		Three.js loaded from CDN via importmap.
		For self-hosting: download three.module.js + examples/jsm/ and update paths.
	-->
	<script type="importmap">
	{
		"imports": {
			"three":          "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
			"three/addons/":  "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
		}
	}
	</script>
</head>
<body>
<div id="transition-curtain"></div>

<div id="viewer-page">

	<!-- Top bar — title is populated by JS from URL params -->
	<div id="viewer-topbar">
		<a href="projects.html" class="back-link" aria-label="Back to projects">
			<svg viewBox="0 0 20 20" aria-hidden="true"><path d="M12.7 4.3L7 10l5.7 5.7-1.4 1.4L4.2 10l7.1-7.1z"/></svg>
			Projects
		</a>
		<div id="viewer-title">
			<h1 id="viewer-title-text">Assembly Viewer</h1>
			<p id="viewer-title-sub">3D Model</p>
		</div>
	</div>

	<!-- Viewer area -->
	<div id="viewer-main">

		<!-- Three.js canvas renders here -->
		<div id="viewer-canvas-mount"></div>

		<!-- Empty state — shown when no model is loaded -->
		<div id="viewer-empty">
			<div class="empty-icon" aria-hidden="true">&#9671;</div>
			<p class="empty-heading">No Model Loaded</p>
			<p class="empty-sub">Browse projects and click <strong>View 3D Model</strong> to load it here, or try the demo assembly below.</p>
			<div style="display:flex;gap:0.6rem;flex-wrap:wrap;justify-content:center;pointer-events:all;">
				<a href="viewer-demo.html?demo=1" class="ctrl-btn">Try Demo</a>
				<a href="projects.html" class="ctrl-btn">Browse Projects</a>
			</div>
		</div>

		<!-- Loading state -->
		<div id="viewer-loading" class="hidden">
			<div class="loading-ring" aria-hidden="true"></div>
			<p id="viewer-loading-text">Loading model&hellip;</p>
		</div>

		<!-- Error state -->
		<div id="viewer-error" class="hidden">
			<div class="empty-icon" aria-hidden="true">&#9888;</div>
			<p class="empty-heading">Model Failed to Load</p>
			<p id="viewer-error-text" class="empty-sub"></p>
		</div>

		<!-- Selected part label (top-centre overlay) -->
		<div id="part-label" class="hidden" aria-live="polite"></div>

		<!-- Explode controls (bottom-left) — hidden until model loads -->
		<div id="viewer-controls" class="hidden">
			<div class="ctrl-row">
				<span class="ctrl-label">Explode</span>
				<span id="explode-pct" class="ctrl-pct">0%</span>
			</div>
			<input type="range" id="explode-slider" min="0" max="100" value="0"
			       aria-label="Explode assembly" />
			<div class="ctrl-buttons">
				<button id="btn-assemble"   class="ctrl-btn">Assemble</button>
				<button id="btn-explode"    class="ctrl-btn">Explode All</button>
				<button id="btn-reset-view" class="ctrl-btn">Reset View</button>
			</div>
			<p class="ctrl-hint">Drag to orbit &nbsp;&middot;&nbsp; Scroll to zoom &nbsp;&middot;&nbsp; Click part to select</p>
		</div>

		<!-- Parts list (right side) — hidden until model loads -->
		<div id="parts-panel" class="hidden">
			<p class="parts-panel-header">Parts</p>
			<ul id="parts-ul" aria-label="Assembly parts list"></ul>
		</div>

	</div><!-- /viewer-main -->

</div><!-- /viewer-page -->

<script src="assets/js/transitions.js"></script>
<script type="module" src="assets/js/assembly-viewer.js"></script>
</body>
</html>
