<!DOCTYPE HTML>
<html lang="en" style="background:#1b1f22">
<head>
	<title>Assembly Viewer | Adam Grim</title>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
	<link rel="stylesheet" href="assets/css/main.css" />
	<link rel="stylesheet" href="assets/css/viewer.css" />
	<!--
		Three.js is loaded from CDN via importmap.
		For production / self-hosting, download the three.module.js and
		OrbitControls.js files and update these paths to local assets.
	-->
	<script type="importmap">
	{
		"imports": {
			"three":          "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
			"three/addons/":  "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
		}
	}
	</script>
</head>
<body>
<div id="transition-curtain"></div>

<div id="viewer-page">

	<!-- Top bar -->
	<div id="viewer-topbar">
		<a href="projects.html" class="back-link" aria-label="Back to projects">
			<svg viewBox="0 0 20 20" aria-hidden="true"><path d="M12.7 4.3L7 10l5.7 5.7-1.4 1.4L4.2 10l7.1-7.1z"/></svg>
			Projects
		</a>
		<div id="viewer-title">
			<h1>Assembly Viewer</h1>
			<p>Placeholder geometry &mdash; replace with your .glb model</p>
		</div>
	</div>

	<!-- Viewer area -->
	<div id="viewer-main">

		<!-- Three.js renders into this div -->
		<div id="viewer-canvas-mount"></div>

		<!-- Selected part name label -->
		<div id="part-label" class="hidden" aria-live="polite"></div>

		<!-- Explode controls (bottom-left) -->
		<div id="viewer-controls">
			<div class="ctrl-row">
				<span class="ctrl-label">Explode</span>
				<span id="explode-pct" class="ctrl-pct">0%</span>
			</div>
			<input type="range" id="explode-slider" min="0" max="100" value="0"
			       aria-label="Explode assembly" />
			<div class="ctrl-buttons">
				<button id="btn-assemble"  class="ctrl-btn">Assemble</button>
				<button id="btn-explode"   class="ctrl-btn">Explode All</button>
				<button id="btn-reset-view" class="ctrl-btn">Reset View</button>
			</div>
			<p class="ctrl-hint">Drag to orbit &nbsp;&middot;&nbsp; Scroll to zoom &nbsp;&middot;&nbsp; Click part to select</p>
		</div>

		<!-- Parts list (right side) -->
		<div id="parts-panel">
			<p class="parts-panel-header">Parts</p>
			<ul id="parts-ul" aria-label="Assembly parts list"></ul>
		</div>

	</div><!-- /viewer-main -->

</div><!-- /viewer-page -->

<script src="assets/js/transitions.js"></script>
<script type="module" src="assets/js/assembly-viewer.js"></script>
</body>
</html>
