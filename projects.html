<!DOCTYPE HTML>
<html lang="en" style="background:#1b1f22">
<head>
	<title>Projects | Adam Grim</title>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
	<meta name="description" content="Engineering projects by Adam Grim — fluid mechanics, heat transfer, aerospace, and simulation." />
	<meta property="og:type" content="website" />
	<meta property="og:title" content="Projects | Adam Grim" />
	<meta property="og:description" content="Engineering projects by Adam Grim — fluid mechanics, heat transfer, aerospace, and simulation." />
	<meta property="og:image" content="images/og-preview.jpg" />
	<link rel="stylesheet" href="assets/css/main.css" />
	<link rel="stylesheet" href="assets/css/projects.css" />
	<noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
</head>
<body>

<div id="transition-curtain"></div>
<div id="bg"></div>

<div id="page-wrap">

	<a href="index.html" class="back-link" aria-label="Back to home">
		<svg viewBox="0 0 20 20" aria-hidden="true"><path d="M12.7 4.3L7 10l5.7 5.7-1.4 1.4L4.2 10l7.1-7.1z"/></svg>
		Back to home
	</a>

	<div class="page-header">
		<h1>Projects</h1>
		<div class="underline"></div>
		<p>Click any card to explore &mdash; click again for full details</p>
	</div>

	<div class="filter-wrap">
		<div class="filter-bar" role="group" aria-label="Filter projects by category">
			<button class="filter-btn active" data-filter="all">All</button>
			<button class="filter-btn" data-filter="fluids">Fluids</button>
			<button class="filter-btn" data-filter="thermal">Thermal</button>
			<button class="filter-btn" data-filter="aerospace">Aerospace</button>
			<button class="filter-btn" data-filter="simulation">Simulation</button>
		</div>
		<div class="filter-count" id="filterCount" aria-live="polite"></div>
	</div>

	<div class="card-grid" id="cardGrid" role="list"></div><!-- /card-grid -->

</div><!-- /page-wrap -->

<!-- ── Expanded overlay ───────────────────────────── -->
<div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-labelledby="overlayTitle">
	<div class="overlay-panel" id="overlayPanel">
		<button class="overlay-nav overlay-nav-prev" id="overlayPrev" aria-label="Previous project">&#8592;</button>
		<button class="overlay-nav overlay-nav-next" id="overlayNext" aria-label="Next project">&#8594;</button>
		<button class="overlay-close" id="overlayCloseBtn" aria-label="Close details panel">&#215;</button>

		<img src="" alt="" class="overlay-image hidden" id="overlayImg" />
		<p class="overlay-category" id="overlayCat"></p>
		<h2 class="overlay-title" id="overlayTitle"></h2>
		<div class="overlay-divider"></div>
		<div class="overlay-section">
			<p class="overlay-section-label">Problem</p>
			<p id="overlayProblem"></p>
		</div>
		<div class="overlay-section">
			<p class="overlay-section-label">Approach</p>
			<p id="overlayApproach"></p>
		</div>
		<div class="overlay-section">
			<p class="overlay-section-label">Tools &amp; Methods</p>
			<p id="overlayTools"></p>
		</div>
		<div class="overlay-section">
			<p class="overlay-section-label">Outcome</p>
			<p id="overlayOutcome"></p>
		</div>
		<div class="overlay-tags" id="overlayTags"></div>
		<div class="overlay-counter" id="overlayCounter" aria-live="polite"></div>
	</div>
</div>

<script src="assets/js/transitions.js"></script>
<script src="assets/js/projects.js"></script>

</body>
</html>
